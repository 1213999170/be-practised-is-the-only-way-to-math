<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>数学熟练度 - 连加式计算</title>
    <script>
        var expression = function() {
            var a = getRandom(1, 10);
            var b = getRandom(1, 10);
            var c = getRandom(1, 10);
            var d = getRandom(1, 10);
            return {
                expression: a + ' + ' + b + ' + ' + c + ' + ' + d + ' = ',
                answer: a + b + c + d
            };
        };

        var n = 30;
        var cols = 3;

        var currentExpressions = [];
        var originalExpressions = [];
        var historyRecords = [];
        var historyIndex = 0;
        var hasGenerated = false;

        function createExpressionLine(outputDiv, expressions) {
            var rowDiv;
            expressions.forEach(function(expr, index) {
                if (index % cols === 0) {
                    rowDiv = document.createElement('div');
                    rowDiv.style.display = 'flex';
                    outputDiv.appendChild(rowDiv);
                }
                
                var p = document.createElement('p');
                p.textContent = expr.expression;
                p.dataset.answer = expr.answer;
                
                rowDiv.appendChild(p);
                currentExpressions.push(p);
            });
        }

        var originalExpressions = [];

        function showAnswers() {
            if (originalExpressions.length === 0) {
                currentExpressions.forEach(function(p) {
                    originalExpressions.push(p.textContent);
                });
            }
            currentExpressions.forEach(function(p, index) {
                if (originalExpressions[index]) {
                    p.innerHTML = originalExpressions[index] + p.dataset.answer;
                }
            });
        }

        function hideAnswers() {
            currentExpressions.forEach(function(p, index) {
                if (originalExpressions[index]) {
                    p.textContent = originalExpressions[index];
                }
            });
        }

        function getRandom(min, max) {
            return Math.floor(Math.random() * (max - min) + min);
        }

        function formatTime(seconds) {
            var minutes = Math.floor(seconds / 60);
            var remainingSeconds = seconds % 60;
            if (minutes > 0) {
                return minutes + ' 分 ' + remainingSeconds + ' 秒';
            }
            return remainingSeconds + ' 秒';
        }

        function generateExpressions() {
            var outputDiv = document.getElementById('expression');
            outputDiv.textContent = '';

            var expressions = [];
            currentExpressions = [];
            originalExpressions = [];

            for (var i = 0; i < n; i++) {
                expressions.push(expression());
            }

            createExpressionLine(outputDiv, expressions);

            var timeContainer = document.createElement('div');
            timeContainer.className = 'time-info';
            timeContainer.style.marginTop = '20px';

            var passingP = document.createElement('p');
            passingP.textContent = '合格线: ' + formatTime(120);
            passingP.style.marginBottom = '5px';
            timeContainer.appendChild(passingP);

            var excellentP = document.createElement('p');
            excellentP.textContent = '优秀线: ' + formatTime(60);
            timeContainer.appendChild(excellentP);

            outputDiv.appendChild(timeContainer);

            if (!hasGenerated) {
                hasGenerated = true;
                var genBtn = document.getElementById('generateBtn');
                var showBtn = document.getElementById('showAnswerBtn');
                var hideBtn = document.getElementById('hideAnswerBtn');
                
                if (genBtn) genBtn.textContent = '重新生成';
                if (showBtn) showBtn.style.display = 'inline-block';
                if (hideBtn) hideBtn.style.display = 'inline-block';
            }

            addToHistory(expressions);
        }

        function addToHistory(expressions) {
            historyIndex++;
            var record = {
                id: historyIndex,
                expressions: JSON.parse(JSON.stringify(expressions)),
                timestamp: new Date().toLocaleTimeString()
            };
            historyRecords.push(record);
            
            var historyItem = document.createElement('div');
            historyItem.innerHTML = '记录 #' + historyIndex + ' - ' + record.timestamp;
            historyItem.style.cursor = 'pointer';
            historyItem.style.margin = '5px 0';
            historyItem.style.padding = '5px';
            historyItem.style.backgroundColor = '#f5f5f5';
            historyItem.style.borderRadius = '3px';
            historyItem.onclick = function() {
                restoreFromHistory(record);
            };
            
            document.getElementById('history').appendChild(historyItem);
        }

        function restoreFromHistory(record) {
            var outputDiv = document.getElementById('expression');
            outputDiv.textContent = '';
            
            currentExpressions = [];
            originalExpressions = [];
            createExpressionLine(outputDiv, record.expressions);

            var timeContainer = document.createElement('div');
            timeContainer.className = 'time-info';
            timeContainer.style.marginTop = '20px';

            var passingP = document.createElement('p');
            passingP.textContent = '合格线: ' + formatTime(120);
            passingP.style.marginBottom = '5px';
            timeContainer.appendChild(passingP);

            var excellentP = document.createElement('p');
            excellentP.textContent = '优秀线: ' + formatTime(60);
            timeContainer.appendChild(excellentP);

            outputDiv.appendChild(timeContainer);
        }

        function printPage() {
            window.print();
        }
    </script>
    <style>
        .btn-styled {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #3498db;
            border: none;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            margin-right: 10px;
        }

        .btn-styled:hover {
            background-color: #2980b9;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        #printBtn {
            margin-left: 400px;
        }

        #expression p {
            margin: 3px 5px;
            width: 300px;
            display: inline-block;
            word-wrap: normal;
            white-space: nowrap;
        }

        #expression div {
            margin-bottom: 10px;
        }

        .time-info {
            font-style: italic;
            color: #666;
        }

        @media print {
            body {
                min-width: auto !important;
                overflow-x: hidden !important;
            }
        }
        
        .donate-section {
            margin-top: 30px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
            text-align: center;
        }
        
        .donate-section h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .donate-qr-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .qr-item {
            text-align: center;
        }
        
        .qr-item img {
            width: 150px;
            height: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        
        .qr-item p {
            margin-top: 8px;
            color: #666;
            font-size: 14px;
        }
    </style>
<link rel="stylesheet" href="/.autoindex.css"></head>
<body style="min-width: 1000px; overflow-x: auto;">
    <h1>数学熟练度 - 连加式计算</h1>
    
    <div style="margin-bottom: 10px;">
        <a href="https://www.baidu.com">上一篇文章</a>
        <span style="margin: 0 20px;"></span>
        <a href="https://www.baidu.com">下一篇文章</a>
    </div>
    
    <button onclick="generateExpressions()" id="generateBtn" class="btn-styled">生成练习</button>
    <button onclick="showAnswers()" id="showAnswerBtn" class="btn-styled" style="display: none;">显示答案</button>
    <button onclick="hideAnswers()" id="hideAnswerBtn" class="btn-styled" style="display: none;">隐藏答案</button>
    <button id="printBtn" onclick="printPage()" class="btn-styled">打印页面</button>

    <div id="expression" style="margin-top: 20px;"></div>
    
    <div style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px;">
        <h3>历史记录</h3>
        <div id="history" style="max-height: 200px; overflow-y: auto;"></div>
    </div>
    
    <div class="donate-section">
        <h3>☕ 赏杯咖啡</h3>
        <div class="donate-qr-container">
            <div class="qr-item">
                <img src="donate_qr_alipay.jpg" alt="支付宝打赏">
            </div>
        </div>
    </div>
</body>
</html>
