<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>数学熟练度 - 乘法练习</title>
    <script>
        var expression = function() {
            var a = getRandom(1000, 10000);
            var b = getRandom(10000, 100000);
            return {
                expression: a + ' × ' + b + ' = ',
                answer: a * b
            };
        };

        var n = 5;

        var currentExpressions = [];
        var originalExpressions = [];
        var historyRecords = [];
        var historyIndex = 0;
        var hasGenerated = false;

        function createExpressionLine(outputDiv, expressions) {
            var lineDiv = document.createElement('div');
            
            expressions.forEach(function(expr, index) {
                var p = document.createElement('p');
                p.textContent = expr.expression;
                p.dataset.answer = expr.answer;
                
                lineDiv.appendChild(p);
                currentExpressions.push(p);
            });
            
            outputDiv.appendChild(lineDiv);
        }

        var originalExpressions = [];

        function showAnswers() {
            if (originalExpressions.length === 0) {
                currentExpressions.forEach(function(p) {
                    originalExpressions.push(p.textContent);
                });
            }
            currentExpressions.forEach(function(p, index) {
                if (originalExpressions[index]) {
                    p.innerHTML = originalExpressions[index] + p.dataset.answer;
                }
            });
        }

        function hideAnswers() {
            currentExpressions.forEach(function(p, index) {
                if (originalExpressions[index]) {
                    p.textContent = originalExpressions[index];
                }
            });
        }

        function getRandom(min, max) {
            return Math.floor(Math.random() * (max - min) + min);
        }

        function formatTime(seconds) {
            var minutes = Math.floor(seconds / 60);
            var remainingSeconds = seconds % 60;
            if (minutes > 0) {
                return minutes + ' 分 ' + remainingSeconds + ' 秒';
            }
            return remainingSeconds + ' 秒';
        }

        function generateExpressions() {
            var outputDiv = document.getElementById('expression');
            outputDiv.textContent = '';

            var expressions = [];
            currentExpressions = [];
            originalExpressions = [];

            for (var i = 0; i < n; i++) {
                expressions.push(expression());
            }

            createExpressionLine(outputDiv, expressions);

            var timeContainer = document.createElement('div');
            timeContainer.className = 'time-info';

            var passingP = document.createElement('p');
            passingP.textContent = '合格线: ' + formatTime(900) + '，连续三次完成';
            passingP.style.marginBottom = '5px';
            timeContainer.appendChild(passingP);

            var excellentP = document.createElement('p');
            excellentP.textContent = '优秀线: ' + formatTime(300) + '，连续三次完成';
            timeContainer.appendChild(excellentP);

            outputDiv.appendChild(timeContainer);

            if (!hasGenerated) {
                hasGenerated = true;
                var genBtn = document.getElementById('generateBtn');
                var showBtn = document.getElementById('showAnswerBtn');
                var hideBtn = document.getElementById('hideAnswerBtn');
                
                if (genBtn) genBtn.textContent = '重新生成';
                if (showBtn) showBtn.style.display = 'inline-block';
                if (hideBtn) hideBtn.style.display = 'inline-block';
            }

            addToHistory(expressions);
        }

        function addToHistory(expressions) {
            historyIndex++;
            var record = {
                id: historyIndex,
                expressions: JSON.parse(JSON.stringify(expressions)),
                timestamp: new Date().toLocaleTimeString()
            };
            historyRecords.push(record);
            
            var historyItem = document.createElement('div');
            historyItem.innerHTML = '记录 #' + historyIndex + ' - ' + record.timestamp;
            historyItem.style.cursor = 'pointer';
            historyItem.style.margin = '5px 0';
            historyItem.style.padding = '5px';
            historyItem.style.backgroundColor = '#f5f5f5';
            historyItem.style.borderRadius = '3px';
            historyItem.onclick = function() {
                restoreFromHistory(record);
            };
            
            document.getElementById('history').appendChild(historyItem);
        }

        function restoreFromHistory(record) {
            var outputDiv = document.getElementById('expression');
            outputDiv.textContent = '';
            
            currentExpressions = [];
            originalExpressions = [];
            createExpressionLine(outputDiv, record.expressions);

            var timeContainer = document.createElement('div');
            timeContainer.className = 'time-info';

            var passingP = document.createElement('p');
            passingP.textContent = '合格线: ' + formatTime(900) + '，连续三次完成';
            passingP.style.marginBottom = '5px';
            timeContainer.appendChild(passingP);

            var excellentP = document.createElement('p');
            excellentP.textContent = '优秀线: ' + formatTime(450) + '，连续三次完成';
            timeContainer.appendChild(excellentP);

            outputDiv.appendChild(timeContainer);
        }

        function printPage() {
            window.print();
        }

        function showCustomDialog() {
            document.getElementById('customDialog').classList.add('show');
        }

        function closeCustomDialog() {
            document.getElementById('customDialog').classList.remove('show');
        }

        function startCustomPractice() {
            var da = parseInt(document.getElementById('digitsA').value);
            var db = parseInt(document.getElementById('digitsB').value);

            var minA = Math.pow(10, da - 1);
            var maxA = Math.pow(10, da) - 1;
            var minB = Math.pow(10, db - 1);
            var maxB = Math.pow(10, db) - 1;

            var customExpr = function() {
                var a = getRandom(minA, maxA);
                var b = getRandom(minB, maxB);
                return {
                    expression: a + ' × ' + b + ' = ',
                    answer: a * b
                };
            };

            var outputDiv = document.getElementById('expression');
            outputDiv.textContent = '';

            var expressions = [];
            currentExpressions = [];
            originalExpressions = [];

            for (var i = 0; i < 5; i++) {
                expressions.push(customExpr());
            }

            expressions.forEach(function(expr) {
                var p = document.createElement('p');
                p.textContent = expr.expression;
                p.dataset.answer = expr.answer;
                outputDiv.appendChild(p);
                currentExpressions.push(p);
            });

            var timeContainer = document.createElement('div');
            timeContainer.className = 'time-info';
            var passingP = document.createElement('p');
            passingP.textContent = '合格线: -';
            passingP.style.marginBottom = '5px';
            timeContainer.appendChild(passingP);
            var excellentP = document.createElement('p');
            excellentP.textContent = '优秀线: -';
            timeContainer.appendChild(excellentP);
            outputDiv.appendChild(timeContainer);

            if (!hasGenerated) {
                hasGenerated = true;
                document.getElementById('generateBtn').textContent = '重新生成';
                document.getElementById('showAnswerBtn').style.display = 'inline-block';
                document.getElementById('hideAnswerBtn').style.display = 'inline-block';
            }

            addToHistory(expressions);
            closeCustomDialog();
        }
    </script>
    <style>
        .btn-styled {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #3498db;
            border: none;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            margin-right: 10px;
        }

        .btn-styled:hover {
            background-color: #2980b9;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        #printBtn {
            margin-left: 300px;
        }

        #expression p {
            font-size: 20px;
            margin: 35px 0;
            display: block;
            width: auto;
            word-wrap: normal;
            white-space: nowrap;
        }

        .time-info {
            font-style: italic;
            color: #666;
            margin-top: 0;
        }

        @media print {
            body {
                min-width: auto !important;
                overflow-x: hidden !important;
                font-family: "SimSun", "Songti SC", "STSong", "Microsoft YaHei", sans-serif !important;
            }
            .btn-styled, .donate-section, div[style*="border-top"], div[style*="justify-content"], a[href], #history, #printBtn {
                display: none !important;
            }
            h1 {
                font-size: 24px !important;
                margin-bottom: 10px !important;
            }
            #expression p {
                font-size: 20px !important;
                font-family: "SimSun", "Songti SC", "STSong", "Microsoft YaHei", sans-serif !important;
            }
            .time-info {
                display: block !important;
                font-style: italic !important;
                color: #666 !important;
            }
        }

        
        .donate-section {
            margin-top: 30px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
            text-align: center;
        }
        
        .donate-section h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .donate-qr-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .qr-item {
            text-align: center;
        }
        
        .qr-item img {
            width: 150px;
            height: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        
        .qr-item p {
            margin-top: 8px;
            color: #666;
            font-size: 14px;
        }

        .custom-dialog {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .custom-dialog.show { display: flex; }

        .custom-dialog-content {
            background: white;
            padding: 25px 30px;
            border-radius: 8px;
            text-align: center;
            min-width: 300px;
        }
        .custom-dialog-content label {
            margin: 0 10px;
            font-size: 16px;
        }
        .custom-dialog-content select {
            font-size: 16px;
            padding: 4px 8px;
            margin: 0 5px;
        }
        .custom-dialog-content .btn-row {
            margin-top: 20px;
        }
    </style>
<link rel="stylesheet" href="/.autoindex.css"></head>
<body style="min-width: 1000px; overflow-x: auto;">
    <h1>数学熟练度 3: 乘法练习</h1>
    
    <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <a href="http://106.15.232.237:8080/math/3185529704607183">上一页</a>
        </div>
        <a href="http://106.15.232.237:8080/math/7291048372659014">下一页</a>
    </div>
    
    <button onclick="generateExpressions()" id="generateBtn" class="btn-styled">生成练习</button>
    <button onclick="showAnswers()" id="showAnswerBtn" class="btn-styled" style="display: none;">显示答案</button>
    <button onclick="hideAnswers()" id="hideAnswerBtn" class="btn-styled" style="display: none;">隐藏答案</button>
    <button onclick="showCustomDialog()" class="btn-styled">自定义练习</button>
    <button id="printBtn" onclick="printPage()" class="btn-styled">打印页面</button>

    <div id="expression"></div>
    <div style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px;">
        <h3>历史记录</h3>
        <div id="history" style="max-height: 200px; overflow-y: auto;"></div>
    </div>

    <div class="custom-dialog" id="customDialog">
        <div class="custom-dialog-content">
            <h3 style="margin-top: 0;">自定义乘法练习</h3>
            <div>
                <label>被乘数</label>
                <select id="digitsA">
                    <option value="1">1位数</option>
                    <option value="2">2位数</option>
                    <option value="3">3位数</option>
                    <option value="4">4位数</option>
                    <option value="5">5位数</option>
                </select>
                <label>×</label>
                <label>乘数</label>
                <select id="digitsB">
                    <option value="1">1位数</option>
                    <option value="2" selected>2位数</option>
                    <option value="3">3位数</option>
                    <option value="4">4位数</option>
                    <option value="5">5位数</option>
                </select>
            </div>
            <div class="btn-row">
                <button onclick="startCustomPractice()" class="btn-styled">开始练习</button>
                <button onclick="closeCustomDialog()" class="btn-styled">取消</button>
            </div>
        </div>
    </div>
    
    <div class="donate-section">
        <h3></h3>
        <div class="donate-qr-container">
            <div class="qr-item">
                <img src="donate_qr_alipay.jpg" alt="支付宝打赏">
            </div>
        </div>
    </div>
</body>
</html>
