<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>数学熟练度 - 简单多项式展开练习</title>
    <style>
        .math-fraction {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            font-size: 18px !important;  /* 统一字体大小 */
            padding: 0 2px;
        }
        .math-fraction .numerator {
            display: block;
            border-bottom: 1px solid #333;
            padding: 0 2px;
            line-height: 1;
        }
        .math-fraction .denominator {
            display: block;
            padding: 0 2px;
            line-height: 1;
        }
        .expr-line {
            font-size: 18px !important;
            margin: 10px 0;
            font-family: 'Times New Roman', serif;
        }
    </style>
    <script>
        // 简单多项式展开: (aP + bQ)(cP + dQ)
        // P和Q是随机对
        // 前6题固定(x,1)，后4题从其他对随机

        function getRandom(min, max) {
            var r = Math.floor(Math.random() * (max - min + 1)) + min;
            return r === 0 ? (r >= 0 ? 1 : -1) : r;
        }
        
        function getNonZeroRandom(min, max) {
            var r = getRandom(min, max);
            while (r === 0) {
                r = getRandom(min, max);
            }
            return r;
        }

        var pqPairs = [
            ['x²', '1'],
            ['x', '1'],
            ['x', '1/x'],
            ['1', '1/x'],
            ['x²', '1/x²']
        ];

        function formatTerm(n, variable, isFirst) {
            if (n === 0) return "";
            var sign = n < 0 ? " - " : (isFirst ? "" : " + ");
            var absN = Math.abs(n);
            if (absN === 1) return sign + variable;
            return sign + absN + variable;
        }

        // 格式化单个项：系数*变量，化简显示
        function formatPolyTerm(coeff, variable) {
            if (coeff === 0) return "";
            
            // 如果variable是1，直接返回系数
            if (variable === '1') {
                return coeff > 0 ? String(coeff) : String(coeff);
            }
            
            // 如果variable就是1或者系数为1
            if (coeff === 1) {
                return variable;
            }
            if (coeff === -1) {
                return "-" + variable;
            }
            
            return coeff + variable;
        }

        // 格式化多项式项，带符号处理
        function formatPolyWithSign(coeff, variable, isFirst) {
            if (coeff === 0) return "";
            
            var term = formatPolyTerm(coeff, variable);
            if (isFirst) {
                return term;
            } else {
                return (coeff > 0 ? " + " : " - ") + Math.abs(term);
            }
        }

        function generateExpression(questionNum) {
            // Coefficients
            var a = getNonZeroRandom(-9, 9);
            var b = getNonZeroRandom(-9, 9);
            var c = getNonZeroRandom(-9, 9);
            var d = getNonZeroRandom(-9, 9);
            
            var P, Q, idx;
            
            if (questionNum < 6) {
                // 前6题固定 (x, 1)
                P = "x";
                Q = "1";
            } else {
                // 后4题随机
                idx = Math.floor(Math.random() * 4);
                P = pqPairs[idx][0];
                Q = pqPairs[idx][1];
            }
            
            // Build question terms - simplified display
            // 简化显示: 系数*变量，Q=1时只显示系数
            // 生成分数 HTML
            function makeFraction(numerator, denominator, isHtml) {
                if (numerator === 0) return "";
                if (isHtml) {
                    // 负号放在整个分式前面
                    var absNum = Math.abs(numerator);
                    var sign = numerator < 0 ? "-" : "";
                    if (sign) {
                        return sign + '<span class="math-fraction"><span class="numerator">' + absNum + '</span><span class="denominator">' + denominator + '</span></span>';
                    }
                    return '<span class="math-fraction"><span class="numerator">' + absNum + '</span><span class="denominator">' + denominator + '</span></span>';
                }
                var sign = numerator < 0 ? "-" : "";
                return sign + Math.abs(numerator) + "/" + denominator;
            }

            var makeTerm = function(coeff, variable) {
                // 始终返回绝对值，符号由外部处理
                if (variable === "1") {
                    // 如果变量是1，只显示系数绝对值
                    return String(Math.abs(coeff));
                }
                if (variable.startsWith("1/")) {
                    // 倒数形式：1/x, 1/x²，分数显示
                    var denominator = variable.slice(2); // 去掉开头的1/，得到 x 或 x²
                    if (Math.abs(coeff) === 1) return makeFraction(1, denominator, true);
                    return makeFraction(Math.abs(coeff), denominator, true);
                }
                if (Math.abs(coeff) === 1) return variable;
                return Math.abs(coeff) + variable;
            };
            
            var t1a = makeTerm(a, P);
            var t1b = makeTerm(b, Q);
            var t2c = makeTerm(c, P);
            var t2d = makeTerm(d, Q);
            
            // 构建带HTML的表达式，加空格
            var plusSign = " + ";
            var minusSign = " - ";
            var expr = "(" + t1a + (b >= 0 ? plusSign : minusSign) + t1b + ") (" + t2c + (d >= 0 ? plusSign : minusSign) + t2d + ") = ";
            
            // Calculate expanded: ac*P*P + (ad+bc)*P*Q + bd*Q*Q
            var ac = a * c;
            var pq = a * d + b * c;
            var bd = b * d;
            
            var resultTerms = [];
            
            // Determine P*P, P*Q, Q*Q simplified forms
            if (P === "x" && Q === "1") {
                // x*x = x², x*1 = x, 1*1 = 1
                if (ac !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (ac < 0 ? " - " : " + ")) + Math.abs(ac) + "x²");
                if (pq !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (pq < 0 ? " - " : " + ")) + Math.abs(pq) + "x");
                if (bd !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (bd < 0 ? " - " : " + ")) + Math.abs(bd));
            } else if (P === "x²" && Q === "1") {
                if (ac !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (ac < 0 ? " - " : " + ")) + Math.abs(ac) + "x⁴");
                if (pq !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (pq < 0 ? " - " : " + ")) + Math.abs(pq) + "x²");
                if (bd !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (bd < 0 ? " - " : " + ")) + Math.abs(bd));
            } else if (P === "x" && Q === "1/x") {
                // 分数形式
                if (ac !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (ac < 0 ? " - " : " + ")) + Math.abs(ac));
                if (pq !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (pq < 0 ? " - " : " + ")) + makeFraction(pq, "x", true));
                if (bd !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (bd < 0 ? " - " : " + ")) + makeFraction(bd, "x²", true));
            } else if (P === "1" && Q === "1/x") {
                if (ac !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (ac < 0 ? " - " : " + ")) + Math.abs(ac));
                if (pq !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (pq < 0 ? " - " : " + ")) + makeFraction(pq, "x", true));
                if (bd !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (bd < 0 ? " - " : " + ")) + makeFraction(bd, "x²", true));
            } else if (P === "x²" && Q === "1/x²") {
                if (ac !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (ac < 0 ? " - " : " + ")) + makeFraction(ac, "x⁴", true));
                if (pq !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (pq < 0 ? " - " : " + ")) + makeFraction(pq, "x²", true));
                if (bd !== 0) resultTerms.push((resultTerms.length === 0 ? " " : (bd < 0 ? " - " : " + ")) + Math.abs(bd));
            }
            
            var answer = resultTerms.join("");
            
            return {
                expression: expr,
                answer: answer
            };
        }

        var n = 10;
        
        var currentExpressions = [];
        var originalExpressions = [];
        var historyRecords = [];
        var historyIndex = 0;
        var hasGenerated = false;

        function createExpressionLine(outputDiv, expressions) {
            expressions.forEach(function(expr) {
                var p = document.createElement('p');
                p.className = 'expr-line';
                p.innerHTML = expr.expression;
                p.dataset.answer = expr.answer;
                
                outputDiv.appendChild(p);
                currentExpressions.push(p);
            });
        }

        var originalExpressions = [];

        function showAnswers() {
            if (originalExpressions.length === 0) {
                currentExpressions.forEach(function(p) {
                    originalExpressions.push(p.textContent);
                });
            }
            currentExpressions.forEach(function(p, index) {
                if (originalExpressions[index]) {
                    p.innerHTML = originalExpressions[index] + p.dataset.answer;
                }
            });
        }

        function hideAnswers() {
            currentExpressions.forEach(function(p, index) {
                if (originalExpressions[index]) {
                    p.textContent = originalExpressions[index];
                }
            });
        }

        function formatTime(seconds) {
            var minutes = Math.floor(seconds / 60);
            var remainingSeconds = seconds % 60;
            if (minutes > 0) {
                return minutes + ' 分 ' + remainingSeconds + ' 秒';
            }
            return remainingSeconds + ' 秒';
        }

        function generateExpressions() {
            var outputDiv = document.getElementById('expression');
            outputDiv.textContent = '';

            var expressions = [];
            currentExpressions = [];
            originalExpressions = [];

            for (var i = 0; i < n; i++) {
                expressions.push(generateExpression(i));
            }

            createExpressionLine(outputDiv, expressions);

            var timeContainer = document.createElement('div');
            timeContainer.className = 'time-info';
            timeContainer.style.marginTop = '20px';

            var passingP = document.createElement('p');
            passingP.textContent = '合格线: ' + formatTime(300);
            passingP.style.marginBottom = '5px';
            timeContainer.appendChild(passingP);

            var excellentP = document.createElement('p');
            excellentP.textContent = '优秀线: ' + formatTime(150);
            timeContainer.appendChild(excellentP);

            outputDiv.appendChild(timeContainer);

            if (!hasGenerated) {
                hasGenerated = true;
                var genBtn = document.getElementById('generateBtn');
                var showBtn = document.getElementById('showAnswerBtn');
                var hideBtn = document.getElementById('hideAnswerBtn');
                
                if (genBtn) genBtn.textContent = '重新生成';
                if (showBtn) showBtn.style.display = 'inline-block';
                if (hideBtn) hideBtn.style.display = 'inline-block';
            }

            addToHistory(expressions);
        }

        function addToHistory(expressions) {
            historyIndex++;
            var record = {
                id: historyIndex,
                expressions: JSON.parse(JSON.stringify(expressions)),
                timestamp: new Date().toLocaleTimeString()
            };
            historyRecords.push(record);
            
            var historyItem = document.createElement('div');
            historyItem.innerHTML = '记录 #' + historyIndex + ' - ' + record.timestamp;
            historyItem.style.cursor = 'pointer';
            historyItem.style.margin = '5px 0';
            historyItem.style.padding = '5px';
            historyItem.style.backgroundColor = '#f5f5f5';
            historyItem.style.borderRadius = '3px';
            historyItem.onclick = function() {
                restoreFromHistory(record);
            };
            
            document.getElementById('history').appendChild(historyItem);
        }

        function restoreFromHistory(record) {
            var outputDiv = document.getElementById('expression');
            outputDiv.textContent = '';
            
            currentExpressions = [];
            originalExpressions = [];
            createExpressionLine(outputDiv, record.expressions);

            var timeContainer = document.createElement('div');
            timeContainer.className = 'time-info';
            timeContainer.style.marginTop = '20px';

            var passingP = document.createElement('p');
            passingP.textContent = '合格线: ' + formatTime(300);
            passingP.style.marginBottom = '5px';
            timeContainer.appendChild(passingP);

            var excellentP = document.createElement('p');
            excellentP.textContent = '优秀线: ' + formatTime(150);
            timeContainer.appendChild(excellentP);

            outputDiv.appendChild(timeContainer);
        }

        function printPage() {
            window.print();
        }
    </script>
    <style>

            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;

        .btn-styled:hover {
            background-color: #2980b9;

        }

        #printBtn {
            margin-left: 400px;
        }

        #expression p {
            margin: 3px 0;

            display: inline-block;
            font-size: 24px;
            line-height: 1.6;
        }

        .time-info {
            font-style: italic;
            color: #666;
        }

        @media print {
            body {
                min-width: auto !important;
                overflow-x: hidden !important;
            }
        }
        
        .donate-section {
            margin-top: 30px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
            text-align: center;
        }
        
        .donate-qr-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .qr-item {
            text-align: center;
        }
        
        .qr-item img {
            width: 150px;
            height: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }
    </style>
<link rel="stylesheet" href="/.autoindex.css"></head>
<body style="min-width: 1000px; overflow-x: auto;">
    <h1>数学熟练度 - 简单多项式展开练习</h1>
    
    <div style="margin-bottom: 10px;">
        <a href="https://www.baidu.com">上一篇文章</a>
        <span style="margin: 0 20px;"></span>
        <a href="https://www.baidu.com">下一篇文章</a>
    </div>
    
    <button onclick="generateExpressions()" id="generateBtn" class="btn-styled">生成练习</button>
    <button onclick="showAnswers()" id="showAnswerBtn" class="btn-styled" style="display: none;">显示答案</button>
    <button onclick="hideAnswers()" id="hideAnswerBtn" class="btn-styled" style="display: none;">隐藏答案</button>
    <button id="printBtn" onclick="printPage()" class="btn-styled">打印页面</button>

    <div id="expression" style="margin-top: 20px;"></div>
    
    <div style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 20px;">
        <h3>历史记录</h3>
        <div id="history" style="max-height: 200px; overflow-y: auto;"></div>
    </div>

        <div class="donate-qr-container">
            <div class="qr-item">
                <img src="donate_qr_alipay.jpg" alt="支付宝打赏">
            </div>
        </div>
    </div>
</body>
