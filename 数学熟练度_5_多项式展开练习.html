<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>数学熟练度 - 多项式展开练习</title>
    <script>
        // 多项式展开练习
        // 5道题: (a + bx + cx²)(d + ex + fx²) = 一元多项式，从高次到低次

        function getRandom(min, max) {
            var r = Math.floor(Math.random() * (max - min + 1)) + min;
            return r === 0 ? (r >= 0 ? 1 : -1) : r;
        }
        
        function getNonZeroRandom(min, max) {
            var r = getRandom(min, max);
            while (r === 0) {
                r = getRandom(min, max);
            }
            return r;
        }

        function formatTerm(n, variable, isFirst) {
            if (n === 0) return "";
            var sign = n < 0 ? " - " : (isFirst ? "" : " + ");
            var prefix = (isFirst || n < 0) ? "" : " ";
            var absN = Math.abs(n);
            if (absN === 1) return prefix + sign + variable;
            return prefix + sign + absN + variable;
        }


        function expressionType1() {
            var a = getNonZeroRandom(-9, 9);
            var b = getNonZeroRandom(-5, 5);
            var c = getNonZeroRandom(-4, 4);
            var d = getNonZeroRandom(-9, 9);
            var e = getNonZeroRandom(-5, 5);
            var f = getNonZeroRandom(-4, 4);
            
            var ad = a * d;
            var ae = a * e;
            var bd = b * d;
            var af = a * f;
            var be = b * e;
            var cd = c * d;
            var bf = b * f;
            var ce = c * e;
            var cf = c * f;
            
            var coeff4 = cf;     // x⁴ 系数
            var coeff3 = bf + ce;  // x³ 系数
            var coeff2 = af + be + cd; // x² 系数
            var coeff1 = ae + bd;  // x 系数
            var coeff0 = ad;      // 常数
            
            // Build expression string
            var terms1 = [];
            if (c !== 0) terms1.push(formatTerm(c, "x²", terms1.length === 0));
            if (b !== 0) terms1.push(formatTerm(b, "x", terms1.length === 0));
            if (a !== 0) terms1.push((terms1.length === 0 ? "" : (a < 0 ? " - " : " + ")) + Math.abs(a));
            var expr1 = terms1.join("");
            var terms2 = [];
            if (f !== 0) terms2.push(formatTerm(f, "x²", terms2.length === 0));
            if (e !== 0) terms2.push(formatTerm(e, "x", terms2.length === 0));
            if (d !== 0) terms2.push((terms2.length === 0 ? "" : (d < 0 ? " - " : " + ")) + Math.abs(d));
            var expr2 = terms2.join("");
            var expr = "(" + expr1 + ")(" + expr2 + ") = ";
            
            // Build answer string - 从高次到低次，处理负数
            var terms = [];
            // x⁴
            if (coeff4 !== 0) {
                terms.push(formatTerm(coeff4, 'x⁴', terms.length === 0));
            }
            // x³
            if (coeff3 !== 0) {
                terms.push(formatTerm(coeff3, 'x³', terms.length === 0));
            }
            // x²
            if (coeff2 !== 0) {
                terms.push(formatTerm(coeff2, 'x²', terms.length === 0));
            }
            // x
            if (coeff1 !== 0) {
                terms.push(formatTerm(coeff1, 'x', terms.length === 0));
            }
            // 常数
            if (coeff0 !== 0) {
                var sign = coeff0 < 0 ? "-" : (terms.length === 0 ? "" : "+");
                terms.push(sign + Math.abs(coeff0));
            }
            
            var answer = terms.join(' ');
            
            return {
                expression: expr,
                answer: answer,
                type: 1
            };
        }



        
        var currentExpressions = [];
        var originalExpressions = [];
        var historyRecords = [];
        var historyIndex = 0;
        var hasGenerated = false;

        function createExpressionLine(outputDiv, expressions) {
            expressions.forEach(function(expr) {
                var p = document.createElement('p');
                p.textContent = expr.expression;
                p.dataset.answer = expr.answer;
                
                outputDiv.appendChild(p);
                currentExpressions.push(p);
            });
        }

        var originalExpressions = [];

        function showAnswers() {
            if (originalExpressions.length === 0) {
                currentExpressions.forEach(function(p) {
                    originalExpressions.push(p.textContent);
                });
            }
            currentExpressions.forEach(function(p, index) {
                if (originalExpressions[index]) {
                    p.innerHTML = originalExpressions[index] + p.dataset.answer;
                }
            });
        }

        function hideAnswers() {
            currentExpressions.forEach(function(p, index) {
                if (originalExpressions[index]) {
                    p.textContent = originalExpressions[index];
                }
            });
        }

        function formatTime(seconds) {
            var minutes = Math.floor(seconds / 60);
            var remainingSeconds = seconds % 60;
            if (minutes > 0) {
                return minutes + ' 分 ' + remainingSeconds + ' 秒';
            }
            return remainingSeconds + ' 秒';
        }

        function generateExpressions() {
            var outputDiv = document.getElementById('expression');
            outputDiv.textContent = '';

            var expressions = [];
            currentExpressions = [];
            originalExpressions = [];

            // Generate 5 of type 1
            for (var i = 0; i < 5; i++) {
                expressions.push(expressionType1());
            }

            createExpressionLine(outputDiv, expressions);

            var timeContainer = document.createElement('div');
            timeContainer.className = 'time-info';
            timeContainer.style.marginTop = '20px';

            var passingP = document.createElement('p');
            passingP.textContent = '合格线: ' + formatTime(300);
            passingP.style.marginBottom = '5px';
            timeContainer.appendChild(passingP);

            var excellentP = document.createElement('p');
            excellentP.textContent = '优秀线: ' + formatTime(105);
            timeContainer.appendChild(excellentP);

            outputDiv.appendChild(timeContainer);

            if (!hasGenerated) {
                hasGenerated = true;
                var genBtn = document.getElementById('generateBtn');
                var showBtn = document.getElementById('showAnswerBtn');
                var hideBtn = document.getElementById('hideAnswerBtn');
                
                if (genBtn) genBtn.textContent = '重新生成';
                if (showBtn) showBtn.style.display = 'inline-block';
                if (hideBtn) hideBtn.style.display = 'inline-block';
            }

            addToHistory(expressions);
        }

        function addToHistory(expressions) {
            historyIndex++;
            var record = {
                id: historyIndex,
                expressions: JSON.parse(JSON.stringify(expressions)),
                timestamp: new Date().toLocaleTimeString()
            };
            historyRecords.push(record);
            
            var historyItem = document.createElement('div');
            historyItem.innerHTML = '记录 #' + historyIndex + ' - ' + record.timestamp;
            historyItem.style.cursor = 'pointer';
            historyItem.style.margin = '5px 0';
            historyItem.style.padding = '5px';
            historyItem.style.backgroundColor = '#f5f5f5';
            historyItem.style.borderRadius = '3px';
            historyItem.onclick = function() {
                restoreFromHistory(record);
            };
            
            document.getElementById('history').appendChild(historyItem);
        }

        function restoreFromHistory(record) {
            var outputDiv = document.getElementById('expression');
            outputDiv.textContent = '';
            
            currentExpressions = [];
            originalExpressions = [];
            createExpressionLine(outputDiv, record.expressions);

            var timeContainer = document.createElement('div');
            timeContainer.className = 'time-info';
            timeContainer.style.marginTop = '20px';

            var passingP = document.createElement('p');
            passingP.textContent = '合格线: ' + formatTime(300);
            passingP.style.marginBottom = '5px';
            timeContainer.appendChild(passingP);

            var excellentP = document.createElement('p');
            excellentP.textContent = '优秀线: ' + formatTime(150);
            timeContainer.appendChild(excellentP);

            outputDiv.appendChild(timeContainer);
        }

        function printPage() {
            window.print();
        }
    </script>
    <style>
        .btn-styled {

        }

        #printBtn {

        }

        #expression p {
            font-size: 24px;

        }

        .time-info {

        @media print {
            body {
                min-width: auto !important;

            }

                display: none !important;
            }
            h1 {
                font-size: 24px !important;
                margin-bottom: 10px !important;
            }
            #expression p {
                font-size: 20px !important;
                font-family: "SimSun", "Songti SC", "STSong", "Microsoft YaHei", sans-serif !important;
            }
            .time-info {
                display: block !important;
                font-style: italic !important;
                color: #666 !important;
            }
        }

        
        .donate-section {
            margin-top: 30px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
            text-align: center;
        }
        
        .donate-qr-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .qr-item {
            text-align: center;
        }
        
        .qr-item img {
            width: 150px;
            height: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }
    </style>

    <h1>数学熟练度 - 多项式展开练习</h1>
    
    <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">

    </div>
    
    <button onclick="generateExpressions()" id="generateBtn" class="btn-styled">生成练习</button>
    <button onclick="showAnswers()" id="showAnswerBtn" class="btn-styled" style="display: none;">显示答案</button>
    <button onclick="hideAnswers()" id="hideAnswerBtn" class="btn-styled" style="display: none;">隐藏答案</button>
